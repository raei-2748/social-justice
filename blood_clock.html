<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Clock - Knox Grammar WGS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #0d1526;
            --knox-blue: #003DA5;
            --electric-blue: #4a9eff;
            --text-white: #f0ede6;
            --text-muted: #6b7a9a;
            --gold: #d4a843;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-white);
            font-family: 'Syne', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at center, rgba(0, 61, 165, 0.15) 0%, var(--bg-primary) 60%);
        }

        .header {
            position: absolute;
            top: 24px;
            left: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--knox-blue);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .clock-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .clock-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 61, 165, 0.4);
            animation: pulseGlow 2s infinite alternate ease-in-out;
        }

        @media (prefers-reduced-motion: reduce) {
            .clock-glow {
                animation: none;
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 15px rgba(0, 61, 165, 0.2);
            }
            100% {
                box-shadow: 0 0 45px rgba(0, 61, 165, 0.8);
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(0, 61, 165, 0.0);
            z-index: 1;
            pointer-events: none;
        }

        .flash-active {
            animation: flashAnim 0.8s ease-out;
        }

        @keyframes flashAnim {
            0% {
                background-color: rgba(0, 61, 165, 0.4);
            }
            100% {
                background-color: rgba(0, 61, 165, 0.0);
            }
        }

        .clock-text {
            position: relative;
            z-index: 3;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-display {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            color: var(--text-white);
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
        }

        .time-subtext {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
        }

        .counter-section {
            margin-top: 60px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .counter-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .counter-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 80px;
            font-weight: 700;
            color: var(--knox-blue);
            line-height: 1;
            margin-bottom: 4px;
            display: inline-block;
            transition: color 0.4s ease;
        }

        .counter-sublabel {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            color: var(--text-white);
        }

        .counter-pulse {
            animation: counterPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--electric-blue);
        }

        @keyframes counterPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .context-strip {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 0 40px 40px 40px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            border-left: 3px solid var(--knox-blue);
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border-radius: 0 8px 8px 0;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-left-color: var(--electric-blue);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .stat-label {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="header">Knox Grammar / World's Greatest Shave 2026</div>

    <div class="main-content">
        <div class="clock-container">
            <div class="clock-glow"></div>
            <div class="flash-layer" id="flashLayer"></div>
            <canvas id="arcCanvas" width="500" height="500"></canvas>
            <div class="clock-text">
                <div class="time-display" id="timeDisplay">90:00</div>
                <div class="time-subtext">until the next death</div>
            </div>
        </div>

        <div class="counter-section">
            <div class="counter-label">Since you opened this page:</div>
            <div class="counter-number" id="deathCounter">0</div>
            <div class="counter-sublabel">Australians have died from blood cancer</div>
        </div>
    </div>

    <div class="context-strip">
        <div class="stat-card">
            <div class="stat-value">16 deaths per day</div>
            <div class="stat-label">Average mortality rate across Australia</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">135,000</div>
            <div class="stat-label">Australians currently living with blood cancer</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">275,000</div>
            <div class="stat-label">Projected total patients by 2035</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('arcCanvas');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('timeDisplay');
        const deathCounter = document.getElementById('deathCounter');
        const flashLayer = document.getElementById('flashLayer');

        // Setup high-DPI canvas
        const size = 500;
        const ratio = window.devicePixelRatio || 1;
        canvas.width = size * ratio;
        canvas.height = size * ratio;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        ctx.scale(ratio, ratio);

        const NINETY_MINS_MS = 90 * 60 * 1000;
        const startTime = Date.now();
        let lastDeaths = 0;

        const c1 = { r: 0, g: 61, b: 165 }; // Knox Blue
        const c2 = { r: 74, g: 158, b: 255 }; // Electric Blue

        function drawArc(progress) {
            ctx.clearRect(0, 0, size, size);

            // Blend color
            const blend = 1 - progress;
            const r = Math.round(c1.r + (c2.r - c1.r) * blend);
            const g = Math.round(c1.g + (c2.g - c1.g) * blend);
            const b = Math.round(c1.b + (c2.b - c1.b) * blend);
            const strokeColor = `rgb(${r}, ${g}, ${b})`;

            const center = size / 2;
            const radius = (size / 2) - 10;

            // Background arc
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 61, 165, 0.1)';
            ctx.lineWidth = 6;
            ctx.stroke();

            // Active arc depletes clockwise from full
            const MathPI2 = Math.PI * 2;
            const startAngle = -Math.PI / 2 + MathPI2 * (1 - progress);
            const endAngle = -Math.PI / 2 + MathPI2;

            if (progress > 0 && progress <= 1) {
                ctx.beginPath();
                ctx.arc(center, center, radius, startAngle, endAngle, false);
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        let lastUpdateTime = 0;

        function update() {
            const now = Date.now();
            const elapsed = now - startTime;
            
            const deaths = Math.floor(elapsed / NINETY_MINS_MS);
            const remainder = elapsed % NINETY_MINS_MS;
            const remainingMs = NINETY_MINS_MS - remainder;
            const progress = remainingMs / NINETY_MINS_MS;

            // Throttle inner text and DOM updates
            if (now - lastUpdateTime >= 100) {
                const totalSeconds = Math.ceil(remainingMs / 1000);
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (deaths > lastDeaths) {
                    lastDeaths = deaths;
                    deathCounter.textContent = deaths;
                    
                    // Flash circle
                    flashLayer.classList.remove('flash-active');
                    void flashLayer.offsetWidth; // trigger reflow
                    flashLayer.classList.add('flash-active');
                    
                    // Pulse counter
                    deathCounter.classList.remove('counter-pulse');
                    void deathCounter.offsetWidth;
                    deathCounter.classList.add('counter-pulse');
                }
                lastUpdateTime = now;
            }

            drawArc(progress);
            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
